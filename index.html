function uid(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function pad2(n){return String(n).padStart(2,'0')}
function todayAdString(){const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`}
function todayNepaliLike(){
  // Default date is today's B.S. date converted from today's AD date.
  return adToBsLocal(new Date()) || '२०८३-०२-२४';
}
function bsToAdLocal(bsInput){
  const parsed=parseYmd(toEng(String(bsInput||'')));
  if(!parsed) return '';
  const anchorAd=new Date(2026,5,7); // 2026-06-07
  let bs={y:parsed.y,m:parsed.m,d:parsed.d};
  const target={y:parsed.y,m:parsed.m,d:parsed.d};
  let current={y:2083,m:2,d:24};
  function ml(y,m){return (BS_MONTH_LENGTHS[y]&&BS_MONTH_LENGTHS[y][m-1])||30}
  let diff=0;
  while(current.y!==target.y||current.m!==target.m||current.d!==target.d){
    if(current.y<target.y||current.y===target.y&&current.m<target.m||current.y===target.y&&current.m===target.m&&current.d<target.d){
      current.d++;
      if(current.d>ml(current.y,current.m)){current.d=1;current.m++;if(current.m>12){current.m=1;current.y++;}}
      diff++;
    } else {
      current.d--;
      if(current.d<1){current.m--;if(current.m<1){current.m=12;current.y--;}current.d=ml(current.y,current.m);}
      diff--;
    }
  }
  const ad=new Date(anchorAd);
  ad.setDate(ad.getDate()+diff);
  return `${ad.getFullYear()}-${pad2(ad.getMonth()+1)}-${pad2(ad.getDate())}`;
}
function parseSettingsDateInput(raw){
  const input=String(raw||'').trim();
  if(!input) return {ad:todayAdString(),bs:todayNepaliLike()};
  const parts=input.split('/').map(x=>x.trim()).filter(Boolean);
  let ad='', bs='';
  if(parts.length===1){
    if(isLikelyAdDate(parts[0])){ad=parts[0];bs=adToBsLocal(parts[0])||'';} else {bs=parts[0];ad=bsToAdLocal(parts[0])||todayAdString();}
  } else {
    const [first,second]=parts;
    if(isLikelyAdDate(first)){ad=first;bs=adToBsLocal(first)||second||'';} else if(isLikelyAdDate(second)){ad=second;bs=adToBsLocal(second)||first||'';} else {bs=first;ad=bsToAdLocal(first)||todayAdString();}
  }
  if(!bs && ad) bs=adToBsLocal(ad)||todayNepaliLike();
  if(!ad && bs) ad=bsToAdLocal(bs)||todayAdString();
  return {ad,bs};
}
function parseYmd(s=''){
  const m=toEng(String(s||'')).trim().match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  return m?{y:+m[1],m:+m[2],d:+m[3]}:null;
}
function isLikelyAdDate(s=''){
  const p=parseYmd(s); return !!(p && p.y>=1900 && p.y<2050);
}
function bsToYmdString(bs){return bs?`${toNep(bs.y)}-${toNep(pad2(bs.m))}-${toNep(pad2(bs.d))}`:''}
function adToBsLocal(adInput){
  const ad=(adInput instanceof Date)?new Date(adInput.getFullYear(),adInput.getMonth(),adInput.getDate()):(()=>{const p=parseYmd(adInput);return p?new Date(p.y,p.m-1,p.d):null})();
  if(!ad || isNaN(ad)) return '';
  const anchorAd=new Date(2026,5,7); // 2026-06-07
  let bs={y:2083,m:2,d:24};       // 2083-02-24
  let diff=Math.round((ad-anchorAd)/86400000);
  function ml(y,m){return (BS_MONTH_LENGTHS[y]&&BS_MONTH_LENGTHS[y][m-1])||30}
  if(diff>=0){while(diff-- >0){bs.d++; if(bs.d>ml(bs.y,bs.m)){bs.d=1;bs.m++; if(bs.m>12){bs.m=1;bs.y++;}}}}
  else{while(diff++ <0){bs.d--; if(bs.d<1){bs.m--; if(bs.m<1){bs.m=12;bs.y--;} bs.d=ml(bs.y,bs.m);}}}
  return bsToYmdString(bs);
}
async function adToBsViaApi(adString){
  // API is tried first for English AD dates. If unavailable/CORS-blocked, local converter is used.
  const p=parseYmd(adString); if(!p) return '';
  const ymd=`${p.y}-${pad2(p.m)}-${pad2(p.d)}`;
  const urls=[
    `https://nepali-date-converter-rest.netlify.app/api/date/ad-to-bs?date=${encodeURIComponent(ymd)}`,
    `https://api.nepali-date-converter.com/api/convert/ad-to-bs?date=${encodeURIComponent(ymd)}`
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store'}); if(!r.ok) continue;
      const data=await r.json();
      const val=data.bs||data.bsDate||data.nepaliDate||data.date||data.result||data.convertedDate;
      if(typeof val==='string' && parseYmd(val)) return toNep(`${parseYmd(val).y}-${pad2(parseYmd(val).m)}-${pad2(parseYmd(val).d)}`);
      const obj=data.bs||data.result||data;
      if(obj && (obj.year||obj.y) && (obj.month||obj.m) && (obj.day||obj.d)) return toNep(`${obj.year||obj.y}-${pad2(obj.month||obj.m)}-${pad2(obj.day||obj.d)}`);
    }catch(e){}
  }
  return adToBsLocal(ymd);
}
function formatItiDate(input=''){
  const raw=String(input||'').trim();
  if(/^इति\s+संवत्?/.test(raw)) return raw;
  let s=raw || todayNepaliLike();
  if(isLikelyAdDate(s)) s=adToBsLocal(s) || s;
  const p=parseYmd(s);
  if(!p) return `इति संवत् ${toNep(s)} शुभम्`;
  const monthName=bsMonths[p.m]||toNep(p.m);
  // रोज: Sunday = १, Monday = २ ... Saturday = ७.
  let roj;
  if(isLikelyAdDate(raw)){
    const adp=parseYmd(raw);
    roj=new Date(adp.y,adp.m-1,adp.d).getDay()+1;
  } else {
    const adDate=bsToAdLocal(s);
    if(adDate){
      const adp=parseYmd(adDate);
      roj=new Date(adp.y,adp.m-1,adp.d).getDay()+1;
    } else {
      roj=new Date().getDay()+1;
    }
  }
  return `इति संवत् ${toNep(p.y)} साल ${monthName} महिना ${toNep(p.d)} गते रोज ${toNep(roj)} शुभम्`;
}

function cleanCaseNo(s=''){return String(s||'').replace(/[\r\n]+/g,' ').replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim()}
function extractRegNo(s=''){const m=String(s||'').match(/\(([^)]*)\)/);return m?m[1].trim():''}

function normalizeDateInputValue(raw){
  let s=String(raw||'').trim();
  if(!s)return '';
  s=toEng(s).replace(/[.\/]/g,'-').replace(/\s+/g,'');
  const compact=s.replace(/-/g,'');
  if(/^\d{8}$/.test(compact)){
    s=compact.slice(0,4)+'-'+compact.slice(4,6)+'-'+compact.slice(6,8);
  }
  const p=parseYmd(s);
  if(!p)return String(raw||'').trim();
  return toNep(`${p.y}-${pad2(p.m)}-${pad2(p.d)}`);
}
function extractPesiDateFromSource(raw){
  const src=String(raw||'');
  const variants=[src, decodeHtmlSource(src)];
  for(const text of variants){
    const patterns=[
      /<input\b[^>]*(?:name|id)\s*=\s*["']pesi_date["'][^>]*\bvalue\s*=\s*["']([^"']+)["'][^>]*>/i,
      /<input\b[^>]*\bvalue\s*=\s*["']([^"']+)["'][^>]*(?:name|id)\s*=\s*["']pesi_date["'][^>]*>/i,
      /pesi_date[^>\n]*value\s*=\s*["']([^"']+)["']/i,
      /मिति\s*([०-९0-9]{4}[-/.]?[०-९0-9]{2}[-/.]?[०-९0-9]{2})/i
    ];
    for(const re of patterns){
      const m=text.match(re);
      if(m && m[1]){
        const v=normalizeDateInputValue(m[1]);
        if(v)return v;
      }
    }
  }
  return '';
}
function getInputDateForGroup(g){
  const domVal=(typeof document!=='undefined' && document.getElementById('inputDate'))?document.getElementById('inputDate').value:'';
  const val=domVal || (g&&g.inputDate) || extractPesiDateFromSource(g&&g.input) || (g&&g.settings&&g.settings.date) || state.settings.date || todayNepaliLike();
  return normalizeDateInputValue(val) || todayNepaliLike();
}
function extractBenchLabel(text){
  const t=htmlTextOnly(text||'');
  const m=t.match(/इजल[ाा]श?\s*[:：\-]?\s*([०-९0-9]+)/i) || t.match(/bench\s*[:：\-]?\s*([0-9]+)/i);
  if(!m)return '';
  return 'इजलास '+toNep(m[1]);
}
function detectJudgeFullTitle(text){
  let t=htmlTextOnly(text||'');
  t=t.replace(/\s+/g,' ').trim();
  const m=t.match(/(माननीय\s+(?:जिल्ला\s+)?न्यायाधीश\s+श्री\s*[^<\n\r\t]+)/);
  let title=m?m[1]:'';
  if(!title && /न्यायाधीश|श्री/.test(t)){
    const cleaned=t.replace(/.*?(माननीय\s*)?/,'माननीय ');
    const m2=cleaned.match(/(माननीय\s+(?:जिल्ला\s+)?न्यायाधीश\s+श्री\s*.+)$/);
    title=m2?m2[1]:'';
  }
  if(!title)return '';
  title=title
    .replace(/इजल[ाा]श?\s*[:：\-]?\s*[०-९0-9]+/gi,'')
    .replace(/<[^>]*>/g,'')
    .replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  return title;
}
function makeJudgeSectionKey(bench,judge,order){
  const b=toEng(String(bench||'')).replace(/\s+/g,'_').replace(/[^A-Za-z0-9_\-]/g,'') || 'bench';
  const j=toEng(stripJudgeName(judge||'judge')).replace(/\s+/g,'_').replace(/[^A-Za-z0-9_\-]/g,'').slice(0,48) || 'judge';
  return `${b}__${j}__${order||1}`;
}
function judgeOptionLabel(bench,judge){
  const b=String(bench||'').trim();
  const j=String(judge||'').trim();
  return b&&j?`${b} — ${j}`:(j||b||'न्यायाधीश');
}
function sameJudge(a,b){
  const norm=x=>toEng(stripJudgeName(String(x||''))).replace(/\s+/g,'').toLowerCase();
  const aa=norm(a), bb=norm(b);
  return !!(aa&&bb&&(aa===bb||aa.includes(bb)||bb.includes(aa)));
}
function parseJson(raw){const arr=JSON.parse(raw);if(!Array.isArray(arr))return {headers:[],rows:[]};if(arr.length&&typeof arr[0]==='object'&&!Array.isArray(arr[0])){const headers=[...new Set(arr.flatMap(o=>Object.keys(o)))];return {headers,rows:arr.map(o=>headers.map(h=>o[h]??''))}}return parseMatrix(arr)}
function stripJudgeName(text){
  return String(text||'')
    .replace(/&nbsp;/g,' ')
    .replace(/माननीय/g,'')
    .replace(/जिल्ला/g,'')
    .replace(/न्यायाधीश/g,'')
    .replace(/श्री/g,'')
    .replace(/Hon\.?|Judge/gi,'')
    .replace(/इजलाश|इजलास|बेन्च|bench|court\s*no\.?/gi,'')
    .replace(/[0-9०-९]+/g,'')
    .replace(/[:：\-]+/g,' ')
    .replace(/\s+/g,' ')

}
function decodeHtmlSource(raw){
  const txt=String(raw||'');
  const ta=document.createElement('textarea');
  ta.innerHTML=txt;
  return ta.value;
}
function htmlTextOnly(html){
  const div=document.createElement('div');
  div.innerHTML=String(html||'');
  return (div.textContent||div.innerText||String(html||'')).replace(/\u00a0/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
}
function detectJudgeFromText(text){
  // Correct source pattern:
  // <td align="right"><b> इजलाश 42</b></td>
  // <td align="left" colspan="6" class="judge"><b> माननीय जिल्ला न्यायाधीश श्री शिवप्रसाद  आचार्य</b></td>
  // This returns full title for preview/filtering: माननीय जिल्ला न्यायाधीश श्री शिवप्रसाद आचार्य
  return detectJudgeFullTitle(text);
}
function cellHasClassJudge(cellHtml){
  const open=(String(cellHtml||'').match(/^<t[dh]\b[^>]*>/i)||[''])[0];
  return /\bclass\s*=\s*(["'])[^"']*\bjudge\b[^"']*\1/i.test(open) || /\bclass\s*=\s*judge\b/i.test(open);
}
function extractJudgeMetasFromSource(raw){
  const variants=[];
  const r=String(raw||''); variants.push(r);
  const decoded=decodeHtmlSource(r); if(decoded!==r)variants.push(decoded);
  for(const src of variants){
    const out=[];
    const trRe=/<tr\b[^>]*>[\s\S]*?<\/tr>/gi;
    let m, order=0;
    while((m=trRe.exec(src))){
      const tr=m[0];
      if(!/\bclass\s*=\s*(["'])[^"']*\bjudge\b[^"']*\1/i.test(tr) && !/\bclass\s*=\s*judge\b/i.test(tr))continue;
      const judge=detectJudgeFullTitle(tr)||detectJudgeFromText(tr);
      if(!judge)continue;
      const bench=extractBenchLabel(tr)||extractBenchLabel(src.slice(Math.max(0,m.index-600),m.index));
      order++;
      const sectionKey=makeJudgeSectionKey(bench,judge,order);
      out.push({judge,bench,label:judgeOptionLabel(bench,judge),sectionKey,order,start:m.index,end:trRe.lastIndex});
    }
    if(out.length)return out;
    const cellRe=/<t[dh]\b[^>]*>[\s\S]*?<\/t[dh]>/gi;
    order=0;
    while((m=cellRe.exec(src))){
      const cell=m[0];
      if(!cellHasClassJudge(cell))continue;
      const judge=detectJudgeFromText(cell);
      if(!judge)continue;
      const back=src.slice(Math.max(0,m.index-700),m.index);
      const bench=extractBenchLabel(back);
      order++;
      const sectionKey=makeJudgeSectionKey(bench,judge,order);
      out.push({judge,bench,label:judgeOptionLabel(bench,judge),sectionKey,order,start:m.index,end:cellRe.lastIndex});
    }
    if(out.length)return out;
  }
  return [];
}
function extractJudgeNamesFromSource(raw){return extractJudgeMetasFromSource(raw).map(x=>x.judge);}

function detectJudgeFromTable(table){
  const judgeCell=table.querySelector('td.judge, th.judge, .judge');
  if(judgeCell){
    const j=detectJudgeFromText(judgeCell.textContent||'');
    if(j)return j;
  }
  for(const tr of table.querySelectorAll('tr')){
    const cells=[...tr.children].map(td=>(td.textContent||'').replace(/\s+/g,' ').trim()).filter(Boolean);
    if(cells.length>=2 && cells.some(c=>/इजलाश|इजलास/i.test(c))){
      const candidate=cells.find(c=>/माननीय|न्यायाधीश|श्री/.test(c)) || cells.join(' ');
      const j=detectJudgeFromText(candidate);
      if(j)return j;
    }
  }
  return '';
}
function isCauseHeaderRow(row){return (row||[]).some(c=>/मुद्दा\s*न|case\s*no|वादी|प्रतिवादी|दर्ता\s*मिति|मुद्दा\s*विषय/i.test(String(c||'')));}
function parseRowsFromTableHtml(tableHtml){
  const doc=new DOMParser().parseFromString(String(tableHtml||''),'text/html');
  const table=doc.querySelector('table');
  if(!table)return {headers:[],rows:[]};
  const rawRows=[...table.querySelectorAll('tr')]
    .filter(tr=>!isNonCauseHtmlRow(tr))
    .map(tr=>[...tr.children].map(td=>td.textContent.trim().replace(/\s+/g,' ')))
    .filter(r=>r.some(Boolean));
  return parseMatrix(rawRows);
}
function extractJudgeSectionsFromSource(raw){
  const variants=[];
  const r=String(raw||''); variants.push(r);
  const decoded=decodeHtmlSource(r); if(decoded!==r)variants.push(decoded);
  for(const src of variants){
    const judgeCells=extractJudgeMetasFromSource(src);
    if(!judgeCells.length)continue;
    let combinedHeaders=[], combinedRows=[];
    for(const jc of judgeCells){
      const after=src.slice(jc.end||0);
      const tm=after.match(/<table\b[^>]*\brecord_display\b[^>]*>/i) || after.match(/<table\b[^>]*>/i);
      if(!tm)continue;
      const start=(jc.end||0)+tm.index;
      const end=src.indexOf('</table>',start);
      if(end<0)continue;
      const tableHtml=src.slice(start,end+8);
      const parsed=parseRowsFromTableHtml(tableHtml);
      if(!parsed.rows.length)continue;
      let headers=[...parsed.headers];
      if(!headers.some(h=>/इजलास|bench/i.test(h)))headers.push('इजलास');
      if(!headers.some(h=>/न्यायाधीश|judge/i.test(h)))headers.push('न्यायाधीश');
      if(!headers.some(h=>/__section|sectionkey|इजलास\s*क्रम/i.test(h)))headers.push('__section');
      const bi=colIndex(headers,['इजलास','bench']);
      const ji=colIndex(headers,['न्यायाधीश','judge']);
      const si=colIndex(headers,['__section','sectionkey','इजलास क्रम']);
      const rows=parsed.rows.map(r=>{const a=[...r];while(a.length<headers.length)a.push('');a[bi]=jc.bench||'';a[ji]=jc.judge;a[si]=jc.sectionKey||makeJudgeSectionKey(jc.bench,jc.judge,jc.order||0);return a;});
      if(!combinedHeaders.length)combinedHeaders=headers;
      const targetLen=combinedHeaders.length;
      combinedRows.push(...rows.map(r=>{const a=[...r];while(a.length<targetLen)a.push('');return a.slice(0,targetLen)}));
    }
    if(combinedRows.length)return {headers:combinedHeaders,rows:combinedRows};
  }
  return {headers:[],rows:[]};
}

function parseHtml(raw){
  // First use raw-source section parser, because Supreme Court source has separate judge header tables followed by cause-list tables.
  const sectionParsed=extractJudgeSectionsFromSource(raw);
  if(sectionParsed.rows.length)return sectionParsed;
  const doc=new DOMParser().parseFromString(raw,'text/html');
  const tables=[...doc.querySelectorAll('table')];
  if(!tables.length)return {headers:[],rows:[]};
  let currentJudge='';
  let combinedHeaders=[];
  let combinedRows=[];
  let best={headers:[],rows:[]};
  for(const table of tables){
    const foundJudge=detectJudgeFromTable(table);
    const foundBench=extractBenchLabel(table.textContent||'');
    const rawRows=[...table.querySelectorAll('tr')]
      .filter(tr=>!isNonCauseHtmlRow(tr))
      .map(tr=>[...tr.children].map(td=>td.textContent.trim().replace(/\s+/g,' ')))
      .filter(r=>r.some(Boolean));
    const hasCauseHeader=rawRows.some(isCauseHeaderRow);
    if(foundJudge && !hasCauseHeader) currentJudge=foundJudge;
    const parsed=parseMatrix(rawRows);
    if(parsed.rows.length){
      let headers=[...parsed.headers];
      let rows=parsed.rows.map(r=>[...r]);
      if(currentJudge || foundJudge){
        if(!headers.some(h=>/इजलास|bench/i.test(h))) headers.push('इजलास');
        if(!headers.some(h=>/न्यायाधीश|judge/i.test(h))) headers.push('न्यायाधीश');
        const bi=colIndex(headers,['इजलास','bench']);
        const ji=colIndex(headers,['न्यायाधीश','judge']);
        rows=rows.map(r=>{while(r.length<headers.length)r.push(''); if(!r[bi])r[bi]=foundBench||''; if(!r[ji])r[ji]=currentJudge||foundJudge; return r;});
      }
      if(!combinedHeaders.length) combinedHeaders=headers;
      const targetLen=combinedHeaders.length;
      rows=rows.map(r=>{let a=[...r];while(a.length<targetLen)a.push('');return a.slice(0,targetLen)});
      combinedRows.push(...rows);
      if(parsed.rows.length>best.rows.length) best={headers,rows};
    }
    if(foundJudge) currentJudge=foundJudge;
  }
  if(combinedRows.length)return {headers:combinedHeaders,rows:combinedRows};
  return best;
}
function isNonCauseHtmlRow(tr){
  const cells=[...tr.children];
  if(!cells.length)return true;
  const text=tr.textContent.replace(/\s+/g,' ').trim();
  // Explicitly ignore footer / officer rows such as: <tr><td colspan="10">बबिता पौडेल इजलास अधिकृत</td></tr>
  if(cells.length===1 && (cells[0].hasAttribute('colspan') || /इजलास\s*अधिकृत|अधिकृत|सुनवाइ\s*मिति|साप्ताहिक\s*पेशी|खोज्नु\s*होस्/i.test(text))) return true;
  return false;
}
function parseText(raw){let lines=raw.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);let matrix=lines.map(line=>{if(line.includes('\t'))return line.split('\t').map(x=>x.trim());if(line.includes('|'))return line.split('|').map(x=>x.trim()).filter(x=>x);if(line.includes(';'))return line.split(';').map(x=>x.trim());if(line.includes(','))return line.split(',').map(x=>x.trim());return line.split(/\s{2,}/).map(x=>x.trim())});return parseMatrix(matrix)}
function parseMatrix(matrix){matrix=(matrix||[]).filter(r=>Array.isArray(r)&&r.some(c=>String(c||'').trim()));if(!matrix.length)return {headers:[],rows:[]};let first=matrix[0].map(x=>String(x||'').trim());let looksHeader=first.some(c=>/मुद्दा|वादी|प्रतिवादी|दर्ता|case|serial|क्र|सि\.?नं|विषय|कैफियत|फाँट/i.test(c));let headers=looksHeader?first:defaultHeaders(matrix[0].length);let rows=looksHeader?matrix.slice(1):matrix;let max=Math.max(headers.length,...rows.map(r=>r.length));while(headers.length<max)headers.push('Column '+(headers.length+1));rows=rows.map(r=>{let a=[...r];while(a.length<max)a.push('');return a});rows=rows.filter(r=>hasCauseListCaseNumber(headers,r));return {headers,rows}}
function hasCauseListCaseNumber(headers,row){
  if(!Array.isArray(row) || row.length<2) return false;
  const joined=String(row.join(' ')).replace(/\s+/g,' ').trim();
  if(/इजलास\s*अधिकृत|सुनवाइ\s*मिति|साप्ताहिक\s*पेशी|खोज्नु\s*होस्/i.test(joined)) return false;
  const caseIdx=colIndex(headers,['मुद्दा नं','मुद्दा न','case no','caseno','case number']);
  const idx=caseIdx>=0?caseIdx:1;
  const raw=String((row&&row[idx])||'').trim();
  const cleaned=cleanCaseNo(raw);
  if(!cleaned)return false;
  const compact=toEng(cleaned).replace(/[.\s]/g,'').toLowerCase();
  if(/^(मुद्दा|case|caseno|casenumber|मुद्दानं|मुद्दान)$/.test(compact))return false;
  // A valid cause-list row must have an actual case number in the case-number column.
  // Bracketed registration numbers alone are ignored because cleanCaseNo() removes them.

function isPreviewCursorActive(){
  const active=document.activeElement;
  if(!active || active===document.body || active===document.documentElement) return false;
  return !!active.closest('[id^="doc_"]');
}
function updateActivePreviewFromViewport(){
  if(state.activeType!=='preview')return;
  if(!isPreviewCursorActive())return;
  if(typeof modal!=='undefined' && !modal.classList.contains('hidden'))return;
  const wraps=[...document.querySelectorAll('[id^="wrap_id_"]')];
  if(!wraps.length)return;
  let best=null,score=Infinity;
  const anchor=110;
  for(const w of wraps){
    const r=w.getBoundingClientRect();
    if(r.bottom<anchor || r.top>window.innerHeight-80)continue;
    const dist=Math.abs(r.top-anchor);
    if(dist<score){score=dist;best=w;}
  }
  if(!best)best=wraps[0];
  const id=best.getAttribute('data-preview-id');
  if(id&&id!==state.activePreviewId)setActivePreview(id,{scrollNav:true});
}

function savePreview(id){

function commitSave(g,p){
  if(!p.dirty){
    if(p.saved)return toast('यो preview पहिले नै saved छ; नयाँ change छैन।','ok');
    return toast('NOT SAVED as there are NO CHANGES ','danger');
  }
  if(p.beforeChangeContent){
    pushTrash({...p,content:p.beforeChangeContent},p.saved?'Previous saved version before new save':'Previous unsaved version before save');
  }
  p.saved=true;
  p.dirty=false;
  p.beforeChangeContent='';
  p.editMode=false;
  p.updatedAt=Date.now();
  p.previewName=p.previewName||previewLabel(p);
  p.saveId=p.previewName;
  p.editedFileName=p.previewName;
  const item={...p,tableNo:g.no,historyId:p.previewName,savedAt:Date.now(),savedDate:nowDate(),savedTime:nowTime(),editedFileName:p.previewName};
  const i=g.history.findIndex(h=>h.id===p.id||h.historyId===item.historyId);
  if(i>=0)g.history[i]=item;else g.history.push(item);
  render();
  toast('Changed preview same name मा history save भयो। Previous version Trash मा गयो।','ok');
}

function pText(text,opt={},fs){return pXml(rXml(text,opt,fs),opt)}
function pBlank(){return '<w:p/>'}
function pParty(name,role,fs){return pXml(rXml(name||'........................',{},fs)+tabXml()+rXml(role||'',{},fs),{tabs:true,lineSpacing:(fs&&fs.lineSpacing)||state.settings.lineSpacing||1.15})}
function pBody(text,fs){const lines=String(text||'').split(/\n/);return lines.map(line=>pXml(rXml(line || '',{},fs),{align:'both',spacing:'w:after="70"',lineSpacing:(fs&&fs.lineSpacing)||state.settings.lineSpacing||1.15},fs)).join('')}
function pageBreakXml(){return '<w:p><w:r><w:br w:type="page"/></w:r></w:p>'}
function docPartXml(parts,fs,headingLabel){
  const issueLabel = parts.issueLabel||'मुद्दा';
  const lineSpacing=(fs&&fs.lineSpacing)||state.settings.lineSpacing||1.15;
  const issue=parts.issue?`${issueLabel} - ${parts.issue}${/[।.]$/.test(parts.issue)?'':'।'}`:`${issueLabel} - ........................`;
  const caseNo=parts.caseNo?`${parts.caseLabel||'मुद्दा नं.-'}${parts.caseNo}`:'मुद्दा नं.-........................';
  const headingText=headingLabel||`${parts.orderTitle||'आदेश'}${parts.caseNo?` - ${parts.caseNo}`:''}`;
  return [
    pText(headingText,{align:'center',bold:true,style:'Heading1',color:'FFFFFF',lineSpacing},fs),
    pText(parts.court,{align:'center',bold:true,lineSpacing},fs),
    pText(parts.bench,{align:'center',lineSpacing},fs),
    pText(parts.judge,{align:'center',bold:true,lineSpacing},fs),
    pText(parts.orderTitle||'आदेश',{align:'center',bold:true,lineSpacing},fs),
    pText(caseNo,{align:'center',bold:true,lineSpacing},fs),
    pBlank(),
    pParty(parts.party1,parts.party1Role||'वादी',fs),
    pText('विरुद्ध',{align:'center',bold:true,lineSpacing},fs),
    pParty(parts.party2,parts.party2Role||'प्रतिवादी',fs),
    pText(issue,{align:'center',bold:true,underline:true,spacing:'w:before="80" w:after="120"',lineSpacing},fs),
    pBody(parts.body,fs),
    pBlank(),
    pText(parts.signature,{align:'right',lineSpacing},fs),
    pXml(rXml(parts.iti.replace(/\s*\.*$/,''),{},fs)+tabXml(),{tabs:true,lineSpacing})
  ].join('');
}
function minimalDocxXml(bodyXml){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:body>${bodyXml}<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134" w:header="708" w:footer="708" w:gutter="0"/><w:vAlign w:val="center"/><w:cols w:space="720"/><w:docGrid w:linePitch="360"/></w:sectPr></w:body></w:document>`}
function contentTypesXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/><Override PartName="/word/fontTable.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.fontTable+xml"/><Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/><Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/></Types>`}
function relsXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/></Relationships>`}
function docRelsXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/fontTable" Target="fontTable.xml"/></Relationships>`}
function stylesXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:qFormat/><w:rPr><w:rFonts w:ascii="Kalimati" w:hAnsi="Kalimati" w:eastAsia="Kalimati" w:cs="Kalimati"/><w:sz w:val="24"/><w:szCs w:val="24"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:basedOn w:val="Normal"/><w:next w:val="Normal"/><w:uiPriority w:val="9"/><w:qFormat/><w:pPr><w:spacing w:before="240" w:after="120"/></w:pPr><w:rPr><w:rFonts w:ascii="Kalimati" w:hAnsi="Kalimati" w:eastAsia="Kalimati" w:cs="Kalimati"/><w:b/><w:sz w:val="32"/><w:szCs w:val="32"/></w:rPr></w:style></w:styles>`}
function settingsXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:defaultTabStop w:val="720"/><w:characterSpacingControl w:val="doNotCompress"/><w:compat/></w:settings>`}
function fontTableXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:fonts xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:font w:name="Kalimati"><w:charset w:val="00"/><w:family w:val="auto"/><w:pitch w:val="variable"/></w:font></w:fonts>`}
function coreXml(){const d=new Date().toISOString();return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><dc:title>Court Order</dc:title><dc:creator>Cause List Order Generator</dc:creator><cp:lastModifiedBy>Cause List Order Generator</cp:lastModifiedBy><dcterms:created xsi:type="dcterms:W3CDTF">${d}</dcterms:created><dcterms:modified xsi:type="dcterms:W3CDTF">${d}</dcterms:modified></cp:coreProperties>`}
function appXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes"><Application>Cause List Order Generator</Application></Properties>`}
async function makeDocxBlob(items){const zip=new JSZip();let bodyXml='';items.forEach((it,idx)=>{if(idx)bodyXml+=pageBreakXml();const fs=it.settings||state.settings;bodyXml+=docPartXml(extractDocParts(it.html,fs),fs,it.previewName||it.label);});zip.file('[Content_Types].xml',contentTypesXml());zip.folder('_rels').file('.rels',relsXml());const word=zip.folder('word');word.file('document.xml',minimalDocxXml(bodyXml));word.file('styles.xml',stylesXml());word.file('settings.xml',settingsXml());word.file('fontTable.xml',fontTableXml());word.folder('_rels').file('document.xml.rels',docRelsXml());zip.folder('docProps').file('core.xml',coreXml());zip.folder('docProps').file('app.xml',appXml());return await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});}
async function saveDocx(name,items){try{downloadBlob(await makeDocxBlob(items),name);toast('DOCX designated format मा download भयो','ok')}catch(e){console.error(e);toast('DOCX generation fail भयो।','danger')}}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}

document.addEventListener('click',e=>{
  if(!e.target.closest('.nav-actions'))closeItemMenus();
  if(e.target&&e.target.id==='modal')closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!modal.classList.contains('hidden'))closeModal();});
window.addEventListener('scroll',()=>{window.clearTimeout(window.__previewActiveTimer);window.__previewActiveTimer=setTimeout(()=>{if(isPreviewCursorActive())updateActivePreviewFromViewport();},80);},{passive:true});
loadState();render();
</script>
</body>
