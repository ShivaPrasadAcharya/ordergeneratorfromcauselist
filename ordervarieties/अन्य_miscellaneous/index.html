function orderVarietyFiles(){
  const out=[];
  ORDER_VARIETIES.forEach((entry,rootIndex)=>{
    if(!entry)return;
    if(Array.isArray(entry.files)){
      const folderName=String(entry.folder||entry.name||entry.label||('Folder '+(rootIndex+1))).trim();
      const folderPath=String(entry.path||entry.folderPath||entry.folder||entry.name||'').trim();
      entry.files.forEach((file,childIndex)=>{
        if(!file)return;
        file._orderKey='folder:'+rootIndex+':'+childIndex;
        file._orderFolder=folderName;
        file._orderFolderPath=folderPath;
        file._orderDisplayName=String(file.name||file.label||file.filename||('Item '+(childIndex+1))).trim();
        out.push(file);
      });
    }else if(entry.filename || entry.content || entry.contentHtml){
      entry._orderKey='item:'+rootIndex;
      entry._orderFolder=String(entry.folder||entry.folderName||'').trim();
      entry._orderDisplayName=String(entry.name||entry.label||entry.filename||('Item '+(rootIndex+1))).trim();
      out.push(entry);
    }
  });
  return out;
}
function buildOrderVarietyTree(){
  const folders=[];
  const folderMap=new Map();
  const standalone=[];
  orderVarietyFiles().forEach(item=>{
    const folder=String(item._orderFolder||'').trim();
    if(folder){
      if(!folderMap.has(folder)){folderMap.set(folder,{name:folder,items:[]});folders.push(folderMap.get(folder));}
      folderMap.get(folder).items.push(item);
    }else{
      standalone.push(item);
    }
  });
  return {folders,standalone};
}
function findOrderVariety(value){
  const key=String(value||'');
  return orderVarietyFiles().find(o=>o._orderKey===key || o.name===key || o._orderDisplayName===key || o.filename===key);
}
function normalizeDropdownFilterText(txt){return String(txt||'').trim().toLowerCase();}
function orderParentDropdownItems(){
  const tree=buildOrderVarietyTree();
  const items=[];
  tree.folders.forEach((folder,idx)=>{
    items.push({type:'folder', display:`📁 ${String(folder.name||'')}`, value:`folder:${idx}`});
  });
  tree.standalone.forEach(item=>{
    const label=String(item._orderDisplayName||item.name||item.filename||'Order');
    const keywords=String(item.keywords||'').trim();
    const hint=keywords?` - ${String(keywords).split(',')[0]}`:'';
    items.push({type:'order', display:`${label}${hint}`, value:`order:${item._orderKey}`, keywords});
  });
  return items.sort((a,b)=>String(a.display||'').toLowerCase().localeCompare(String(b.display||'').toLowerCase()));
}
function orderChildDropdownItems(folderIndex){
  const tree=buildOrderVarietyTree();
  const folder=tree.folders[Number(folderIndex)];
  if(!folder) return [];
  return folder.items.map(item=>({
    type:'order',
    display:String(item._orderDisplayName||item.name||item.filename||'Order'),
    value:item._orderKey,
    keywords:String(item.keywords||'').trim()
  })).sort((a,b)=>String(a.display||'').toLowerCase().localeCompare(String(b.display||'').toLowerCase()));
}
function filterDropdownItems(items,filter){
  const query=normalizeDropdownFilterText(filter);
  if(!query) return items;
  const filtered=items.filter(item=>{
    return String(item.display||'').toLowerCase().includes(query) || String(item.keywords||'').toLowerCase().includes(query);
  });
  return filtered.length?filtered:items;
}
function orderParentOptionsHtml(filter=''){
  const tree=buildOrderVarietyTree();
  const query=normalizeDropdownFilterText(filter);
  const includeAll=!query;
  let html='<option value="">📋 Select Order</option>';
  const folderMatches=(folder)=>{
    const folderLabel=`📁 ${String(folder.name||'')}`.toLowerCase();
    if(folderLabel.includes(query))return true;
    return folder.items.some(item=>{
      const label=String(item._orderDisplayName||item.name||item.filename||'').toLowerCase();
      const keywords=String(item.keywords||'').toLowerCase();
      return label.includes(query)||keywords.includes(query);
    });
  };
  tree.folders.forEach((folder,idx)=>{
    if(includeAll||folderMatches(folder)) html+=`<option value="folder:${idx}">📁 ${safe(folder.name)}</option>`;
  });
  tree.standalone.forEach(item=>{
    const label=String(item._orderDisplayName||item.name||item.filename||'Order');
    const keywords=String(item.keywords||'');
    const hint=keywords?(' - '+String(keywords).split(',')[0]):'';
    const matches=query && (label.toLowerCase().includes(query)||keywords.toLowerCase().includes(query));
    if(includeAll||matches){
      html+=`<option value="order:${safe(item._orderKey)}" title="${safe(keywords)}">${safe(label)}${safe(hint)}</option>`;
    }
  });
  if(!includeAll && html==='📋 Select Order'){ // no real matches
    return orderParentOptionsHtml();
  }
  return html;
}
function orderChildOptionsHtml(folderIndex,filter=''){
  const tree=buildOrderVarietyTree();
  const folder=tree.folders[Number(folderIndex)];
  if(!folder)return '';
  const query=normalizeDropdownFilterText(filter);
  let items=folder.items;
  if(query){
    const filtered=folder.items.filter(item=>{
      const label=String(item._orderDisplayName||item.name||item.filename||'').toLowerCase();
      const keywords=String(item.keywords||'').toLowerCase();
      return label.includes(query)||keywords.includes(query);
    });
    if(filtered.length) items=filtered;
  }
  return `<option value=""> file छान्नुहोस्</option>` + items.map(item=>{
    const label=item._orderDisplayName||item.name||item.filename||'Order';
    const keywords=String(item.keywords||'').trim();
    const keywordLine=keywords ? `<option value="" disabled class="order-keyword-option">   ↳ keywords: ${safe(keywords)}</option>` : '';
    return `<option value="${safe(item._orderKey)}" title="${safe(keywords)}">${safe(label)}</option>${keywordLine}`;
  }).join('');
}

function xmlEsc(s=''){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function wrapTextWithStyle(text,opt={}){
  if(!text) return '';
  let result = text;
  if(opt.bold) result = `<strong>${result}</strong>`;
  if(opt.italic) result = `<em>${result}</em>`;
  if(opt.underline) result = `<u>${result}</u>`;
  if(opt.color) result = `<span style="color:#${opt.color}">${result}</span>`;
  return result;
}
function docxRunToHtml(run,ns){
  let text='';
  const rPr = run.getElementsByTagNameNS(ns,'rPr')[0];
  const style = {};
  if(rPr){
    if(rPr.getElementsByTagNameNS(ns,'b').length || rPr.getElementsByTagNameNS(ns,'bCs').length) style.bold=true;
    if(rPr.getElementsByTagNameNS(ns,'i').length || rPr.getElementsByTagNameNS(ns,'iCs').length) style.italic=true;
    if(rPr.getElementsByTagNameNS(ns,'u').length) style.underline=true;
    const colorEl = rPr.getElementsByTagNameNS(ns,'color')[0];
    if(colorEl && colorEl.getAttribute('w:val')) style.color = colorEl.getAttribute('w:val');
  }
  for(const child of Array.from(run.childNodes)){
    if(child.nodeType!==1) continue;
    if(child.localName==='t'){
      const txt = child.textContent || '';
      text += xmlEsc(txt);
    } else if(child.localName==='br'){
      text += '<br/>';
    } else if(child.localName==='tab'){
      text += '&emsp;';
    }
  }
  return wrapTextWithStyle(text,style);
}
function docxParagraphToHtml(paragraph,ns){
  const pieces=[];
  for(const child of Array.from(paragraph.childNodes)){
    if(child.nodeType!==1) continue;
    if(child.localName==='r'){
      pieces.push(docxRunToHtml(child,ns));
    } else if(child.localName==='br'){
      pieces.push('<br/>');
    } else if(child.localName==='tab'){
      pieces.push('&emsp;');
    }
  }
  return `<div>${pieces.join('') || ''}</div>`;
}
function docxCellToHtml(cell,ns){
  const paras = Array.from(cell.getElementsByTagNameNS(ns,'p'));
  return paras.map(p=>docxParagraphToHtml(p,ns)).join('');
}
function docxTableToHtml(table,ns){
  const rows = Array.from(table.getElementsByTagNameNS(ns,'tr'));
  return `<table>${rows.map(row=>'<tr>'+Array.from(row.getElementsByTagNameNS(ns,'tc')).map(cell=>`<td>${docxCellToHtml(cell,ns)}</td>`).join('')+'</tr>').join('')}</table>`;
}
function docxDocumentXmlToHtml(xml){
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(xml,'application/xml');
  const ns='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
  const body = xmlDoc.getElementsByTagNameNS(ns,'body')[0];
  if(!body) return '';
  const parts=[];
  for(const node of Array.from(body.childNodes)){
    if(node.nodeType!==1) continue;
    if(node.localName==='p') parts.push(docxParagraphToHtml(node,ns));
    else if(node.localName==='tbl') parts.push(docxTableToHtml(node,ns));
  }
  return parts.join('');
}
function docBinaryToHtml(buf){
  const dec1252 = new TextDecoder('windows-1252');
  const decUtf16 = new TextDecoder('utf-16le');
  const text1252 = dec1252.decode(buf);
  const textUtf16 = decUtf16.decode(buf);
  const score = txt=>((txt.match(/[\w\u0900-\u097F]/g)||[]).length);
  const chosen = score(textUtf16) > score(text1252) ? textUtf16 : text1252;
  const lines = String(chosen||'').split(/\r\n|\r|\n/).map(l=>l.trim()).filter(Boolean);
  return lines.map(line=>xmlEsc(line)).join('<br/>');
}
async function loadOrderVarieties(){
  const rootPaths=['ordervarieties/','./ordervarieties/'];
  await Promise.all(orderVarietyFiles().map(async (o)=>{
    if(!o || !o.filename) return;
    const ext = String(o.filename||'').trim().toLowerCase().split('.').pop();
    let text='';
    let buffer=null;
    const folderPath=String(o.path||o.folderPath||o._orderFolderPath||o._orderFolder||'').trim().replace(/^\/+|\/+$/g,'');
    const basePaths=[];
    if(folderPath){rootPaths.forEach(root=>basePaths.push(root+folderPath+'/'));}
    rootPaths.forEach(root=>basePaths.push(root));
    for(const p of [...new Set(basePaths)]){
      try{
        const url = p + o.filename;
        const res = await fetch(url);
        if(!res.ok) continue;
        if(ext==='docx' || ext==='doc'){
          buffer = await res.arrayBuffer();
          break;
        }
        text = await res.text();
        break;
      }catch(e){/* try next path */}
    }
    if(ext==='docx' && buffer){
      try{
        const zip = await JSZip.loadAsync(buffer);
        const xml = await zip.file('word/document.xml').async('text');
        const html = docxDocumentXmlToHtml(xml);
        o.contentHtml = html || '';
        o.content = html ? '' : xml.replace(/<[^>]+>/g,'').trim();
      }catch(e){
        console.warn('DOCX parse failed for', o.filename, e);
        o.content = (text && String(text)) || (o.content||'');
        o.contentHtml = '';
      }
    } else if(ext==='doc' && buffer){
      try{
        const html = docBinaryToHtml(buffer);
        o.contentHtml = html || '';
        o.content = '';
      }catch(e){
        console.warn('DOC parse failed for', o.filename, e);
        o.content = (text && String(text)) || (o.content||'');
        o.contentHtml = '';
      }

function bsToAdLocal(bsInput){
  const parsed=parseYmd(toEng(String(bsInput||'')));
  if(!parsed) return '';
  const anchorAd=new Date(2026,5,7); // 2026-06-07
  let bs={y:parsed.y,m:parsed.m,d:parsed.d};
  const target={y:parsed.y,m:parsed.m,d:parsed.d};
  let current={y:2083,m:2,d:24};
  let diff=0;
  while(current.y!==target.y||current.m!==target.m||current.d!==target.d){
    if(current.y<target.y||current.y===target.y&&current.m<target.m||current.y===target.y&&current.m===target.m&&current.d<target.d){

      diff--;
    }
  }

function adToBsLocal(adInput){
  const ad=(adInput instanceof Date)?new Date(adInput.getFullYear(),adInput.getMonth(),adInput.getDate()):(()=>{const p=parseYmd(adInput);return p?new Date(p.y,p.m-1,p.d):null})();
  if(!ad || isNaN(ad)) return '';

function formatItiDate(input=''){
  const raw=String(input||'').trim();

  if(isLikelyAdDate(s)) s=adToBsLocal(s) || s;
  const p=parseYmd(s);
  if(!p) return `इति संवत् ${toNep(s)} शुभम्`;
  const monthName=bsMonths[p.m]||toNep(p.m);
  // रोज: Sunday = १, Monday = २ ... Saturday = ७.

  if(isLikelyAdDate(raw)){

  } else {

}

async function ensureOrderVarietyContent(order){
  if(!order)return false;
  if(String(order.contentHtml||'').trim() || String(order.content||'').trim())return true;
  if(!order.filename)return false;
  const ext=String(order.filename||'').trim().toLowerCase().split('.').pop();
  const rootPaths=['ordervarieties/','./ordervarieties/'];
  const folderPath=String(order.path||order.folderPath||order._orderFolderPath||order._orderFolder||'').trim().replace(/^\/+|\/+$/g,'');
  const basePaths=[];
  if(folderPath){rootPaths.forEach(root=>basePaths.push(root+folderPath+'/'));}
  rootPaths.forEach(root=>basePaths.push(root));
  for(const p of [...new Set(basePaths)]){
    try{
      const url=p+order.filename;
      const res=await fetch(url,{cache:'no-cache'});
      if(!res.ok)continue;
      if(ext==='docx'){
        const buffer=await res.arrayBuffer();
        const zip=await JSZip.loadAsync(buffer);
        const xml=await zip.file('word/document.xml').async('text');
        const html=docxDocumentXmlToHtml(xml);
        order.contentHtml=html||'';
        order.content=html?'':xml.replace(/<[^>]+>/g,'').trim();
      }else if(ext==='doc'){
        const buffer=await res.arrayBuffer();
        order.contentHtml=docBinaryToHtml(buffer)||'';
        order.content='';
      }else{
        const text=await res.text();
        if(ext==='json'){
          try{
            const parsed=JSON.parse(text);
            let extracted='';
            if(parsed){
              if(typeof parsed==='string')extracted=parsed;
              else if(typeof parsed.order==='string')extracted=parsed.order;
              else if(typeof parsed.content==='string')extracted=parsed.content;
              else if(typeof parsed.text==='string')extracted=parsed.text;
              else if(typeof parsed==='object'){
                for(const k of Object.keys(parsed)){
                  if(typeof parsed[k]==='string'){extracted=parsed[k];break;}
                }
              }
            }
            order.content=extracted||text||'';
          }catch(e){order.content=text||'';}
        }else{
          order.content=text||'';
        }
        order.contentHtml='';
      }
      return !!(String(order.contentHtml||'').trim() || String(order.content||'').trim());
    }catch(e){/* try next path */}
  }
  return false;
}

function getSelectionOffsetWithin(root){
  const sel=window.getSelection&&window.getSelection();
  if(!root||!sel||!sel.rangeCount)return null;
  const range=sel.getRangeAt(0);
  if(!root.contains(range.startContainer))return null;
  const pre=document.createRange();
  pre.selectNodeContents(root);
  pre.setEnd(range.startContainer,range.startOffset);
  return pre.toString().length;
}
function setSelectionOffsetWithin(root,offset){
  if(!root||offset==null)return false;
  const target=Math.max(0,Number(offset)||0);
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  let node, count=0;
  while((node=walker.nextNode())){
    const len=node.nodeValue.length;
    if(count+len>=target){
      const r=document.createRange();
      r.setStart(node,Math.max(0,Math.min(len,target-count)));
      r.collapse(true);
      const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
      return true;
    }
    count+=len;
  }
  root.focus();
  const r=document.createRange();r.selectNodeContents(root);r.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  return true;
}

function updateActivePreviewFromViewport(force=false){
  if(state.activeType!=='preview')return;
  if(isPreviewAutoScrollSuppressed())return;
  if(!force && Date.now()<(window.__previewTextProgrammaticUntil||0))return;
  const modalEl=document.getElementById('modal');
  if(modalEl && !modalEl.classList.contains('hidden'))return;
  const wraps=previewWraps();
  if(!wraps.length)return;
  const anchor=activePreviewTopOffset()+32;
  const viewportBottom=window.innerHeight-40;
  let best=null;
  let bestScore=Infinity;
  for(const w of wraps){
    const r=w.getBoundingClientRect();
    if(r.bottom<anchor || r.top>viewportBottom)continue;
    const visible=Math.max(0,Math.min(r.bottom,viewportBottom)-Math.max(r.top,anchor));
    const distance=Math.abs(r.top-anchor);
    const score=distance-(visible*0.08);
    if(score<bestScore){best=w;bestScore=score;}
  }
  if(!best){
    for(const w of wraps){
      const r=w.getBoundingClientRect();
      const score=Math.abs(r.top-anchor);
      if(score<bestScore){best=w;bestScore=score;}
    }
  }
  const id=best&&best.getAttribute('data-preview-id');
  if(id) setActivePreview(id,{scrollNav:true,navBehavior:'auto',noSave:true});

function updatePreviewFromSidebarViewport(side,opts={}){

  if(Date.now()<(window.__previewNavClickLockUntil||0))return;

  if(!items.length)return;
  const sideRect=side.getBoundingClientRect();
  let best=null,score=Infinity;
  const anchor=sideRect.top+(sideRect.height*.42);
  for(const item of items){
    const r=item.getBoundingClientRect();
    if(r.bottom<sideRect.top+8 || r.top>sideRect.bottom-8)continue;
    const s=Math.abs((r.top+r.bottom)/2-anchor);

  const id=best&&best.getAttribute('data-preview-id');
  if(!id)return;
  setActivePreview(id,{scrollNav:false,noSave:true});
  if(opts.scrollText!==false && document.getElementById('wrap_'+id)){

function commitSave(g,p,keep){
  if(!p.dirty){
    if(p.saved)return toast('यो preview पहिले नै saved छ; नयाँ change छैन।','ok');
    return toast('NOT SAVED as there are NO CHANGES ','danger');
  }
  if(p.beforeChangeContent){
    pushTrash({...p,content:p.beforeChangeContent},p.saved?'Previous saved version before new save':'Previous unsaved version before save');
  }
  p.saved=true;
  p.dirty=false;
  p.beforeChangeContent='';
  p.editMode=false;
  p.updatedAt=Date.now();
  p.previewName=p.previewName||previewLabel(p);
  p.saveId=p.previewName;
  p.editedFileName=p.previewName;
  const item={...p,tableNo:g.no,historyId:p.previewName,savedAt:Date.now(),savedDate:nowDate(),savedTime:nowTime(),editedFileName:p.previewName};
  const i=g.history.findIndex(h=>h.id===p.id||h.historyId===item.historyId);
  if(i>=0)g.history[i]=item;else g.history.push(item);
  const keepPos=keep||{groupNo:g.no,id:p.id,scrollY:currentScrollTop(),sideScrollTop:currentPreviewSideScrollTop()};
  if(!state.previewStates)state.previewStates={};
  state.previewStates[g.no]={...(state.previewStates[g.no]||{}),activePreviewId:p.id,scrollY:keepPos.scrollY,sideScrollTop:keepPos.sideScrollTop,cursor:keepPos.cursor||((state.previewStates[g.no]||{}).cursor)};

}
